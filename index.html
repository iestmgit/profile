<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل رادمهر اصغری</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Tahoma, sans-serif;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 380px;
        }

        .avatar-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
        }

        .edit-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #24b67e;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .name-container {
            font-size: 19px;
            margin-bottom: 15px;
            color: #222;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .details {
            color: #707579;
            font-size: 16px;
            direction: ltr;
        }

        .ble-url {
            color: #4a90e2;
            text-decoration: none;
            font-weight: bold;
            margin-left: 8px;
        }

        .ble-url:hover {
            text-decoration: underline;
        }

        .divider {
            margin: 0 8px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-box">
            <!-- لینک Blob درخواستی شما -->
            <img src="https://web.bale.ai/e983a326-a491-407c-94bb-c296cf251066" alt="Profile" class="profile-img">
            <div class="edit-btn">✎</div>
        </div>

        <div class="name-container">
            🤝🏆¯\_(ツ)_/¯ <i>radmehr asghari</i> ¯\_(ツ)_/¯🏆🤝
        </div>

        <div class="details">
            <span>+989398212260</span>
            <span class="divider">|</span>
            <a href="https://ble.ir/radmehrasghari" target="_blank" class="ble-url">
                @radmehrasghari
            </a>
        </div>
    </div>

</body>
</html>
