<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل رادمهر اصغری</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/iestmgit/profile/refs/heads/main/1780674535573.jpg">
    <style>
        :root {
            --accent-green: #24b67e;
            --link-blue: #4a90e2;
            --text-gray: #707579;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .profile-card {
            background: white;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            width: 400px;
        }

        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f0f0f0;
        }

        .edit-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: var(--accent-green);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .name-row {
            font-size: 20px;
            margin-bottom: 15px;
            color: #1c1c1c;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .info-row {
            color: var(--text-gray);
            font-size: 17px;
            direction: ltr;
        }

        .ble-link {
            color: var(--link-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .ble-link:hover {
            text-decoration: underline;
        }

        .separator {
            margin: 0 10px;
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <!-- آدرس مستقیم عکس از گیت‌هاب iestmgit -->
            <img src="https://raw.githubusercontent.com/iestmgit/profile/refs/heads/main/1780674535573.jpg" alt="Radmehr Asghari" class="profile-img">
            <div class="edit-badge">✎</div>
        </div>

        <div class="name-row">
            🤝🏆¯\_(ツ)_/¯ <i>radmehr asghari</i> ¯\_(ツ)_/¯🏆🤝
        </div>

        <div class="info-row">
            <span>+989398212260</span>
            <span class="separator">|</span>
            <a href="https://ble.ir/radmehrasghari" target="_blank" class="ble-link">
                @radmehrasghari
            </a>
        </div>
    </div>

</body>
</html>
